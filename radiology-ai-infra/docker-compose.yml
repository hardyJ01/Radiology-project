
services:
  db:
    image: postgres:16-alpine
    container_name: radiology_db
    environment:
      POSTGRES_USER: {POSTGRES_USER}
      POSTGRES_PASSWORD: {POSTGRES_PASSWORD}
      POSTGRES_DB: radiology_ai
    ports:
      - '5432:5432'
  redis:
    image: redis:8-alpine
    container_name: radiology_redis
    ports:
      - '6379:6379'